<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/layout :: head}"></head>
<body>
<div class="wrapper">
    <header th:replace="~{layout/header :: header}"></header>
    <aside th:replace="~{layout/menu :: aside}"></aside>

    <div class="content-page">
        <div class="content">
            <div class="container-fluid">

                <div class="row">
                    <div class="col-12">
                        <div class="page-title-box">
                            <div class="page-title-right">
                                <ol class="breadcrumb m-0">
                                    <li class="breadcrumb-item"><a th:href="@{/inicio}">Inicio</a></li>
                                    <li class="breadcrumb-item active">Servicios</li>
                                </ol>
                            </div>
                            <h4 class="page-title"><i class="mdi mdi-briefcase-check me-2 text-success"></i>Catálogo de Servicios</h4>
                        </div>
                    </div>
                </div>

                <!-- Resumen por categoría -->
                <div class="row mb-3" id="categoriasResumen">
                    <div class="col-sm-auto mb-2" th:each="cat : ${ {'CONTABILIDAD','LEGAL','AUDITORIA','CONSULTORIA','TRAMITES'} }">
                        <div class="badge fs-6 px-3 py-2"
                             th:classappend="${cat == 'CONTABILIDAD'} ? 'bg-soft-primary text-primary' :
                                             (${cat == 'LEGAL'} ? 'bg-soft-danger text-danger' :
                                             (${cat == 'AUDITORIA'} ? 'bg-soft-warning text-warning' :
                                             (${cat == 'CONSULTORIA'} ? 'bg-soft-success text-success' : 'bg-soft-secondary text-secondary')))">
                            <span th:text="${cat}"></span>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-12">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <div class="row mb-3 align-items-center">
                                    <div class="col-sm-6">
                                        <button type="button" class="btn btn-success" onclick="abrirModalNuevo()">
                                            <i class="mdi mdi-plus-circle me-1"></i> Nuevo Servicio
                                        </button>
                                    </div>
                                    <div class="col-sm-6 text-sm-end">
                                        <button type="button" class="btn btn-soft-secondary" onclick="exportarCSV()">
                                            <i class="mdi mdi-file-export me-1"></i> Exportar
                                        </button>
                                    </div>
                                </div>

                                <div class="table-responsive">
                                    <table class="table table-hover table-centered dt-responsive nowrap w-100" id="servicios-datatable">
                                        <thead class="table-light">
                                        <tr>
                                            <th>Nombre del Servicio</th>
                                            <th>Categoría</th>
                                            <th>Precio Base</th>
                                            <th>Periodicidad</th>
                                            <th>Descripción</th>
                                            <th style="width:90px;">Acciones</th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                        <tr th:each="s : ${serviciosList}">
                                            <td class="fw-semibold" th:text="${s.nombre}"></td>
                                            <td>
                                                <span class="badge"
                                                      th:classappend="${s.categoria == 'CONTABILIDAD'} ? 'bg-soft-primary text-primary' :
                                                                       (${s.categoria == 'LEGAL'} ? 'bg-soft-danger text-danger' :
                                                                       (${s.categoria == 'AUDITORIA'} ? 'bg-soft-warning text-warning' :
                                                                       (${s.categoria == 'CONSULTORIA'} ? 'bg-soft-success text-success' : 'bg-soft-secondary text-secondary')))"
                                                      th:text="${s.categoria}">
                                                </span>
                                            </td>
                                            <td class="fw-bold text-success" th:text="'$' + ${#numbers.formatDecimal(s.precio, 1, 2)}"></td>
                                            <td>
                                                <span class="badge bg-info" th:if="${s.periodicidad == 'MENSUAL'}">Mensual</span>
                                                <span class="badge bg-secondary" th:if="${s.periodicidad == 'ANUAL'}">Anual</span>
                                                <span class="badge bg-warning text-dark" th:if="${s.periodicidad == 'UNICO'}">Único</span>
                                                <span class="badge bg-dark" th:if="${s.periodicidad == 'HORA'}">Por Hora</span>
                                            </td>
                                            <td class="text-muted small" style="max-width:250px;white-space:normal;" th:text="${s.descripcion}"></td>
                                            <td>
                                                <a href="javascript:void(0);" class="action-icon text-info"
                                                   th:onclick="'editarServicio(' + ${s.id} + ')'" title="Editar">
                                                    <i class="mdi mdi-square-edit-outline"></i>
                                                </a>
                                                <a href="javascript:void(0);" class="action-icon text-danger"
                                                   th:onclick="'eliminarServicio(' + ${s.id} + ', \'' + ${s.nombre} + '\')'  "
                                                   title="Eliminar">
                                                    <i class="mdi mdi-delete"></i>
                                                </a>
                                            </td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{layout/footer :: footer}"></footer>

<!-- ======== MODAL SERVICIO ======== -->
<div class="modal fade" id="modalServicio" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title" id="modalServicioTitle">
                    <i class="mdi mdi-briefcase-plus me-2"></i>Nuevo Servicio
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <input type="hidden" id="servicioId">
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label fw-semibold">Nombre del Servicio <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="svcNombre" placeholder="Ej: Contabilidad Mensual Persona Jurídica">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Categoría <span class="text-danger">*</span></label>
                        <select class="form-select" id="svcCategoria">
                            <option value="CONTABILIDAD">Contabilidad</option>
                            <option value="LEGAL">Legal / Jurídico</option>
                            <option value="AUDITORIA">Auditoría</option>
                            <option value="CONSULTORIA">Consultoría</option>
                            <option value="TRAMITES">Trámites / Diligencias</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Precio Base (USD) <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" class="form-control" id="svcPrecio" step="0.01" placeholder="0.00">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Frecuencia de Cobro <span class="text-danger">*</span></label>
                        <select class="form-select" id="svcPeriodicidad">
                            <option value="MENSUAL">Mensual (Recurrente)</option>
                            <option value="ANUAL">Anual</option>
                            <option value="UNICO">Pago Único / Eventual</option>
                            <option value="HORA">Por Hora</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Descripción y Actividades Incluidas</label>
                        <textarea class="form-control" id="svcDescripcion" rows="4"
                            placeholder="Detalle las actividades que incluye este servicio..."></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-success" onclick="guardarServicio()">
                    <i class="mdi mdi-content-save me-1"></i> Guardar
                </button>
            </div>
        </div>
    </div>
</div>

<script>
$(document).ready(function() {
    $('#servicios-datatable').DataTable({
        language: { url: 'https://cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json' },
        pageLength: 15,
        columnDefs: [{ orderable: false, targets: 5 }]
    });
});

function abrirModalNuevo() {
    document.getElementById('servicioId').value = '';
    document.getElementById('svcNombre').value = '';
    document.getElementById('svcCategoria').value = 'CONTABILIDAD';
    document.getElementById('svcPrecio').value = '';
    document.getElementById('svcPeriodicidad').value = 'MENSUAL';
    document.getElementById('svcDescripcion').value = '';
    document.getElementById('modalServicioTitle').innerHTML = '<i class="mdi mdi-briefcase-plus me-2"></i>Nuevo Servicio';
    new bootstrap.Modal(document.getElementById('modalServicio')).show();
}

function editarServicio(id) {
    fetch('/fiscore/servicios/' + id)
        .then(r => r.json())
        .then(s => {
            document.getElementById('servicioId').value = s.id;
            document.getElementById('svcNombre').value = s.nombre || '';
            document.getElementById('svcCategoria').value = s.categoria || 'CONTABILIDAD';
            document.getElementById('svcPrecio').value = s.precio || '';
            document.getElementById('svcPeriodicidad').value = s.periodicidad || 'MENSUAL';
            document.getElementById('svcDescripcion').value = s.descripcion || '';
            document.getElementById('modalServicioTitle').innerHTML = '<i class="mdi mdi-briefcase-edit me-2"></i>Editar Servicio';
            new bootstrap.Modal(document.getElementById('modalServicio')).show();
        });
}

function guardarServicio() {
    const id = document.getElementById('servicioId').value;
    const body = {
        nombre: document.getElementById('svcNombre').value,
        categoria: document.getElementById('svcCategoria').value,
        precio: document.getElementById('svcPrecio').value,
        periodicidad: document.getElementById('svcPeriodicidad').value,
        descripcion: document.getElementById('svcDescripcion').value
    };
    const url = id ? '/fiscore/servicios/' + id : '/fiscore/servicios/guardar';
    const method = id ? 'PUT' : 'POST';
    fetch(url, { method, headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) })
        .then(r => r.json())
        .then(data => {
            if (data.error) { Swal.fire('Error', data.error, 'error'); return; }
            Swal.fire({ icon: 'success', title: 'Guardado', text: data.message, timer: 1500, showConfirmButton: false })
                .then(() => location.reload());
        });
}

function eliminarServicio(id, nombre) {
    Swal.fire({
        title: '¿Eliminar servicio?',
        text: nombre + ' será eliminado del catálogo.',
        icon: 'warning', showCancelButton: true,
        confirmButtonColor: '#fa5c7c', cancelButtonText: 'Cancelar', confirmButtonText: 'Sí, eliminar'
    }).then(result => {
        if (result.isConfirmed) {
            fetch('/fiscore/servicios/' + id, { method: 'DELETE' })
                .then(r => r.json())
                .then(() => {
                    Swal.fire({ icon: 'success', title: 'Eliminado', timer: 1200, showConfirmButton: false })
                        .then(() => location.reload());
                });
        }
    });
}

function exportarCSV() {
    let csv = 'Nombre,Categoría,Precio,Periodicidad\n';
    $('#servicios-datatable tbody tr').each(function() {
        const c = $(this).find('td');
        csv += '"'+c.eq(0).text().trim()+'","'+c.eq(1).text().trim()+'","'+c.eq(2).text().trim()+'","'+c.eq(3).text().trim()+'"\n';
    });
    const blob = new Blob([csv], {type: 'text/csv'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = 'servicios.csv'; a.click();
}
</script>
</body>
</html>
